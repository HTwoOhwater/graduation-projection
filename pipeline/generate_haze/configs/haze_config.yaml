seed: 123
output:
  ext: jpg
  outdir: ./gen_haze_out

haze:
  A_values:
    - [245, 238, 225] # bright noon neutral haze
    - [255, 228, 190] # golden warm haze
    - [210, 185, 155] # urban dust warm haze
    - [175, 180, 190] # dense gray fog
    - [135, 150, 180] # twilight cool haze
    - [190, 215, 245] # morning cold-blue haze
  # beta_values 作为插值端点或基础序列，启用插值后将按下面配置重采样。
  # beta_values: [0, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45]
  beta_values: [0, 0.40]
  beta_interpolation:
    enabled: true
    method: linear
    num_levels: 10
    curve: 2.0
  tint: 0.00  # 不混合环境光

dataset:
  train:
    clean_dir: ../../../datasets/train/original_images
    depth_dir: ../../../datasets/train/depth_images
    image_exts: [jpg, jpeg, png, bmp, tif, tiff]
    random_combo: true
  valid:
    clean_dir: ../../../datasets/valid/original_images
    depth_dir: ../../../datasets/valid/depth_images
    image_exts: [jpg, jpeg, png, bmp, tif, tiff]
    random_combo: false
  test:
    clean_dir: ../../../datasets/test/original_images
    depth_dir: ../../../datasets/test/depth_images
    image_exts: [jpg, jpeg, png, bmp, tif, tiff]
    random_combo: false
